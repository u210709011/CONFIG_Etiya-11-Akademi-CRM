# contact-info-service - tum ortamlar icin gecerli ortak konfigurasyon.
# Ortama ozel degerler: contact-info-service-dev.yml / contact-info-service-test.yml / contact-info-service-prod.yml

server:
  port: ${PORT:0}
  # Gateway'in ekledigi X-Forwarded-* header'larina guven - bkz. customer-service/application.yml aciklamasi.
  forward-headers-strategy: framework

spring:
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
eureka:
  instance:
    prefer-ip-address: true
