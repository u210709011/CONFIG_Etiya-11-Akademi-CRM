# contact-info-service - dev ortami.
# Migration kullanilmiyor; semalar Hibernate ddl-auto: update ile senkronize edilir.

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/contact_info_db
    username: crm
    password: crm
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8180/realms/crm
