# contact-info-service - dev ortami.
# Sema artik Flyway ile yonetilir (bkz. src/main/resources/db/migration). Bu ortamda
# DB onceden Hibernate ddl-auto: update ile olusturulmustu - baseline-on-migrate,
# V1'i (baseline) calistirmadan "zaten uygulanmis" sayar; V2+ normal calisir.

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/contact_info_db
    username: crm
    password: crm
  jpa:
    show-sql: true
  flyway:
    baseline-on-migrate: true
    baseline-version: 1
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8180/realms/crm
