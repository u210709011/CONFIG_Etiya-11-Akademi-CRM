# Party Service - tum ortamlar icin gecerli ortak konfigurasyon.
# Ortama ozel degerler: party-service-dev.yml / party-service-test.yml / party-service-prod.yml

server:
  port: ${PORT:0}

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/crm}
    username: ${DB_USERNAME:crm}
    password: ${DB_PASSWORD:crm}
  kafka:
    consumer:
      group-id: party-service
      auto-offset-reset: earliest
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: com.etiya.crm.partyservice.events
        spring.json.value.default.type: com.etiya.crm.partyservice.events.CustomerDeletedEvent
        spring.json.use.type.headers: false

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka}

logging:
  level:
    com.etiya.crm.partyservice: INFO
