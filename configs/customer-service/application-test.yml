# Customer Service - test ortami.
# Test altyapisinin adresleri netlestiginde asagidaki degerler guncellenir.

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/crm}
    username: ${DB_USERNAME:crm}
    password: ${DB_PASSWORD:crm}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/crm}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka}

# service-account (client_credentials) - crm-client (interaktif login) DEGIL, ayri M2M client.
keycloak:
  client-id: ${KEYCLOAK_CLIENT_ID:customer-service-m2m}
  client-secret: ${KEYCLOAK_CLIENT_SECRET:customer-service-m2m-secret}

logging:
  level:
    com.etiya.crm.customerservice: INFO
