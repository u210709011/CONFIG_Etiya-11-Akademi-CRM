# Customer Service - tum ortamlar icin gecerli ortak konfigurasyon.
# Ortama ozel degerler: customer-service-dev.yml / customer-service-test.yml / customer-service-prod.yml

server:
  port: ${PORT:0}

spring:
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
  kafka:
    consumer:
      group-id: customer-service
      auto-offset-reset: earliest
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: com.etiya.crm.customerservice.events
        spring.json.value.default.type: com.etiya.crm.customerservice.events.PartyEvent
        spring.json.use.type.headers: false
    producer:
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

eureka:
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
