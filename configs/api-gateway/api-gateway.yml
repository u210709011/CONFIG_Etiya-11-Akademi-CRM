# API Gateway - tum ortamlar icin gecerli ortak konfigurasyon.
# Ortama ozel degerler: api-gateway-dev.yml / api-gateway-test.yml / api-gateway-prod.yml

eureka:
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,gateway

spring:
  cloud:
    gateway:
      server:
        webflux:
          discovery:
            locator:
              # /customer-service/** gibi adreslerin Eureka uzerinden otomatik yonlendirilmesi
              enabled: true
              lower-case-service-id: true
          # Servisler eklendikce asagidaki gibi route tanimlanir:
          # routes:
          #   - id: customer-service
          #     uri: lb://customer-service
          #     predicates:
          #       - Path=/api/v1/customers/**

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${keycloak.issuer-uri}
