# API Gateway - dev ortami: tum altyapi lokalde (podman compose) calisir.

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

keycloak:
  issuer-uri: http://localhost:8180/realms/crm

spring:
  cloud:
    gateway:
      server:
        webflux:
          routes:
            # Dev'de Eureka paneline gateway uzerinden erisim kolayligi
            - id: discovery-server-ui
              uri: http://localhost:8761
              predicates:
                - Path=/eureka/web
              filters:
                - SetPath=/

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
