# API Gateway - prod ortami: adresler ortam degiskenlerinden gelir,
# varsayilanlar container agindaki servis adlarina goredir.

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://discovery-server:8761/eureka}

discovery:
  dashboard-url: ${EUREKA_DASHBOARD_URL:http://discovery-server:8761}

keycloak:
  issuer-uri: ${KEYCLOAK_ISSUER_URI:http://keycloak:8180/realms/crm}
  client-id: ${KEYCLOAK_CLIENT_ID:crm-client}
  client-secret: ${KEYCLOAK_CLIENT_SECRET}

# Prod'da frontend'in servis edildigi gercek domain(ler) env'den verilmeli,
# guvensiz bir varsayilan birakilmadi (client-secret ile ayni disiplin).
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS}

logging:
  level:
    org.springframework.cloud.gateway: INFO
