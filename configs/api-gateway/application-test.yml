# API Gateway - test ortami.
# Test altyapisinin adresleri netlestiginde asagidaki degerler guncellenir.

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka}

keycloak:
  issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/crm}
  client-id: ${KEYCLOAK_CLIENT_ID:crm-client}
  client-secret: ${KEYCLOAK_CLIENT_SECRET:crm-client-secret}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}

logging:
  level:
    org.springframework.cloud.gateway: INFO
