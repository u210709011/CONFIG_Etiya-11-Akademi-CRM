# Product Service - tum ortamlar icin gecerli ortak konfigurasyon.
# Ortama ozel degerler: application-dev.yml / application-test.yml / application-prod.yml

server:
  port: ${PORT:0}

spring:
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/product_db}
    username: ${DB_USERNAME:crm}
    password: ${DB_PASSWORD:crm}

eureka:
  instance:
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    com.etiya.crm.productservice: INFO