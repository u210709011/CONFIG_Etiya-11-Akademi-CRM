# Product Service - test ortami.
# Test altyapisinin adresleri netlestiginde asagidaki degerler guncellenir.

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/crm}
    username: ${DB_USERNAME:crm}
    password: ${DB_PASSWORD:crm}
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/crm}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka}

logging:
  level:
    com.etiya.crm.productservice: INFO