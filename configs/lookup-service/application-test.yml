# lookup-service - test ortami.

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/lookup_db}
    username: ${DB_USERNAME:crm}
    password: ${DB_PASSWORD:crm}
  jpa:
    show-sql: false
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/crm}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka}

logging:
  level:
    com.etiya.crm.lookupservice: INFO
